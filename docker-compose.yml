services:
  db:
    image: postgres:16-alpine 
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: risk_crm
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_password
    ports:
      - "5433:5432"
    volumes:
      - risk_crm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -Urisk_user -d risk_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: . 
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
    - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
 
volumes:
  risk_crm_pg_data:
    external: true
    name: b4998c82a3a46d002e9372cf0af105a1cda29804af1e8d4b4d2b47fcd47cde61_risk_crm_pg_data