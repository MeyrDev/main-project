services:
  db:
    image: postgres:16-alpine
    container_name: risk_crm_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: risk_crm
      POSTGRES_USER: risk_user
      POSTGRES_PASSWORD: risk_password
    ports:
      - "5433:5432"
    volumes:
      - risk_crm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -Urisk_user -d risk_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risk_crm_app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: ["sh", "-c", "python -m app.main && tail -f /dev/null"]

volumes:
  risk_crm_pg_data:
